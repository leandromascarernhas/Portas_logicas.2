<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Simulador de Portas Lógicas</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#ececec;
        padding:30px;
    }

    .container{
        display:flex;
        flex-direction:column;
        gap:50px;
        align-items:flex-start;
    }

    .circuito{
        display:flex;
        align-items:center;
        gap:25px;
    }

    /* COLUNA DAS CHAVES */
    .inputs{
        display:flex;
        flex-direction:column;
        gap:12px;
        background:#b40000;
        padding:12px;
        border-radius:12px;
    }

    .switch-row{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .bit{
        width:35px;
        height:35px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:22px;
        font-weight:bold;
        border-radius:6px;
        color:white;
    }

    .bit.on{
        background:#d40000;
    }

    .bit.off{
        background:#0040ff;
    }

    .switch{
        width:22px;
        height:22px;
        border-radius:50%;
        border:none;
        cursor:pointer;
        background:#222;
        transition:0.2s;
    }

    .switch.active{
        background:#ff3030;
        box-shadow:0 0 10px red;
    }

    /* ÁREA CENTRAL */
    .meio{
        position:relative;
        display:flex;
        align-items:center;
        gap:20px;
    }

    .linhas{
        position:relative;
        width:160px;
    }

    .linha{
        height:4px;
        margin:22px 0;
        transition:0.2s;
    }

    .linha.on{
        background:red;
        box-shadow:0 0 8px red;
    }

    .linha.off{
        background:#0040ff;
        box-shadow:0 0 8px #0040ff;
    }

    .porta-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }

    .label-porta {
        font-weight: bold;
        color: #444;
        font-size: 14px;
        text-transform: uppercase;
    }

    .porta{
        width:180px;
        height:130px;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    /* SAÍDA */
    .saida{
        width:60px;
        height:60px;
        border-radius:8px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:34px;
        font-weight:bold;
        color:white;
    }

    .saida.on{
        background:red;
        box-shadow:0 0 12px red;
    }

    .saida.off{
        background:#0040ff;
        box-shadow:0 0 12px #0040ff;
    }

    h1{
        margin-bottom:30px;
    }

</style>
</head>
<body>

<h1>Simulador de Portas Lógicas</h1>

<div class="container" id="container"></div>

<script>

const portasSVG = {

AND: `
<svg width="140" height="120" viewBox="0 0 140 120">
  <path d="M20 10 L70 10 Q125 60 70 110 L20 110 Z"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
</svg>`,

OR: `
<svg width="140" height="120" viewBox="0 0 140 120">
  <path d="M20 10 Q55 60 20 110 Q90 110 125 60 Q90 10 20 10"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
</svg>`,

NAND: `
<svg width="160" height="120" viewBox="0 0 160 120">
  <path d="M20 10 L70 10 Q125 60 70 110 L20 110 Z"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
  <circle cx="140" cy="60" r="10" fill="white" stroke="#b97b00" stroke-width="4"/>
</svg>`,

NOR: `
<svg width="160" height="120" viewBox="0 0 160 120">
  <path d="M20 10 Q55 60 20 110 Q90 110 125 60 Q90 10 20 10"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
  <circle cx="140" cy="60" r="10" fill="white" stroke="#b97b00" stroke-width="4"/>
</svg>`,

XOR: `
<svg width="150" height="120" viewBox="0 0 150 120">
  <path d="M28 10 Q63 60 28 110"
  fill="none" stroke="#b97b00" stroke-width="4"/>
  <path d="M40 10 Q75 60 40 110 Q105 110 135 60 Q105 10 40 10"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
</svg>`,

XNOR: `
<svg width="170" height="120" viewBox="0 0 170 120">
  <path d="M28 10 Q63 60 28 110"
  fill="none" stroke="#b97b00" stroke-width="4"/>
  <path d="M40 10 Q75 60 40 110 Q105 110 135 60 Q105 10 40 10"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
  <circle cx="155" cy="60" r="10" fill="white" stroke="#b97b00" stroke-width="4"/>
</svg>`,

NOT: `
<svg width="150" height="120" viewBox="0 0 150 120">
  <polygon points="20,10 20,110 110,60"
  fill="#f5c86a" stroke="#b97b00" stroke-width="4"/>
  <circle cx="125" cy="60" r="10" fill="white" stroke="#b97b00" stroke-width="4"/>
</svg>`
};

const tipos = [
    "AND",
    "OR",
    "NAND",
    "NOR",
    "XOR",
    "XNOR",
    "NOT"
];

const container = document.getElementById("container");

tipos.forEach(tipo => criarCircuito(tipo));

function criarCircuito(tipo){

    const circuito = document.createElement("div");
    circuito.className = "circuito";

    // Quantidade de entradas
    const entradas = tipo === "NOT" ? 1 : 3;

    // COLUNA DAS CHAVES
    const inputs = document.createElement("div");
    inputs.className = "inputs";

    let estados = [];

    for(let i=0;i<entradas;i++){

        estados.push(1);

        const row = document.createElement("div");
        row.className = "switch-row";

        const bit = document.createElement("div");
        bit.className = "bit on";
        bit.innerText = "1";

        const sw = document.createElement("button");
        sw.className = "switch active";

        sw.onclick = ()=>{

            estados[i] = estados[i] ? 0 : 1;

            bit.innerText = estados[i];

            bit.className = estados[i] ? "bit on" : "bit off";

            sw.className = estados[i]
                ? "switch active"
                : "switch";

            atualizar();
        };

        row.appendChild(bit);
        row.appendChild(sw);

        inputs.appendChild(row);
    }

    // MEIO
    const meio = document.createElement("div");
    meio.className = "meio";

    const linhas = document.createElement("div");
    linhas.className = "linhas";

    let linhasHTML = [];

    for(let i=0;i<entradas;i++){
        linhasHTML.push(`<div class="linha on"></div>`);
    }

    linhas.innerHTML = linhasHTML.join("");

    // --- NOVA ESTRUTURA PARA O NOME ---
    const portaWrapper = document.createElement("div");
    portaWrapper.className = "porta-wrapper";

    const label = document.createElement("div");
    label.className = "label-porta";
    label.innerText = tipo; // Define o nome da porta

    const porta = document.createElement("div");
    porta.className = "porta";
    porta.innerHTML = portasSVG[tipo];

    portaWrapper.appendChild(label);
    portaWrapper.appendChild(porta);
    // ----------------------------------

    // SAÍDA
    const saida = document.createElement("div");
    saida.className = "saida on";
    saida.innerText = "1";

    meio.appendChild(linhas);
    meio.appendChild(portaWrapper); // Adiciona o wrapper com o nome

    circuito.appendChild(inputs);
    circuito.appendChild(meio);
    circuito.appendChild(saida);

    container.appendChild(circuito);

    function atualizar(){

        // Atualiza linhas
        const linhasDOM = linhas.querySelectorAll(".linha");

        estados.forEach((estado,index)=>{
            linhasDOM[index].className =
                estado ? "linha on" : "linha off";
        });

        let resultado = 0;

        switch(tipo){

            case "AND":
                resultado = estados.every(v=>v===1) ? 1 : 0;
            break;

            case "OR":
                resultado = estados.some(v=>v===1) ? 1 : 0;
            break;

            case "NAND":
                resultado = estados.every(v=>v===1) ? 0 : 1;
            break;

            case "NOR":
                resultado = estados.some(v=>v===1) ? 0 : 1;
            break;

            case "XOR":
                resultado = estados.filter(v=>v===1).length % 2;
            break;

            case "XNOR":
                resultado = !(estados.filter(v=>v===1).length % 2) ? 1 : 0;
            break;

            case "NOT":
                resultado = estados[0] ? 0 : 1;
            break;
        }

        saida.innerText = resultado;

        saida.className =
            resultado ? "saida on" : "saida off";
    }

    atualizar();
}

</script>

</body>
</html>
